<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Me Chame pelo Seu Nome (2017)</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 900px; }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
        }
        .sub {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
        }
        .player-wrapper {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,.6);
        }
        .player-wrapper video {
            width: 100%;
            display: block;
        }
        /* Plyr customizations for mobile */
        .plyr { border-radius: 12px; overflow: hidden; }
        .plyr--video .plyr__controls {
            padding: 12px 15px;
        }
        .plyr__control {
            padding: 12px !important;
        }
        .plyr__controls__item.plyr__control {
            min-width: 48px;
            min-height: 48px;
        }
        .plyr__progress__container {
            min-height: 12px;
        }
        .plyr__progress__buffer {
            height: 6px;
        }
        .plyr__progress input[type=range] {
            height: 12px;
        }

        .info {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.82rem;
            color: #777;
        }
        .info span {
            background: #1a1a1a;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .badge { color: #f5c518; }
        footer { margin-top: 30px; font-size: 0.75rem; color: #444; }
        .fallback {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .fallback a {
            display: inline-block;
            background: #1a73e8;
            color: #fff;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 12px;
        }
        .fallback.show { display: block; }

        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            body { padding: 12px; }
            .plyr__control { padding: 14px !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Me Chame pelo Seu Nome <span style="color:#666;font-weight:400;">(2017)</span></h1>
        <div class="sub">Call Me by Your Name · Luca Guadagnino</div>

        <div class="player-wrapper">
            <video id="player" controls playsinline webkit-playsinline
                   poster="https://image.tmdb.org/t/p/w500/7mLoT2U7Bo4nLspJc0DC6zBkCvL.jpg"
                   data-plyr-config='{"title":"Me Chame pelo Seu Nome","seekTime":10,"iconUrl":"https://cdn.plyr.io/3.7.8/plyr.svg"}'>
                <source src="https://drive.usercontent.google.com/download?id=1i3oEziEYpcbPTTZNxzLaGbMm-aHMez5Y&export=download&confirm=t"
                        type="video/mp4">
            </video>
            <div class="fallback" id="fallback">
                <p style="color:#888;margin-bottom:8px;">❌ Não foi possível carregar o vídeo direto.</p>
                <a href="https://drive.google.com/file/d/1i3oEziEYpcbPTTZNxzLaGbMm-aHMez5Y/preview?rm=minimal" target="_blank">▶ Abrir no Google Drive</a>
            </div>
        </div>

        <div class="info">
            <span>🎬 720p BluRay</span>
            <span class="badge">🔊 Dublado</span>
            <span>📦 1.2 GB</span>
            <span>⭐ 8.0/10</span>
        </div>
        <footer></footer>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('player');
            const fallback = document.getElementById('fallback');

            // If video fails to load, show fallback
            video.addEventListener('error', () => {
                video.style.display = 'none';
                fallback.classList.add('show');
            });

            // Initialize Plyr
            const player = new Plyr(video, {
                controls: [
                    'play-large',
                    'rewind',
                    'play',
                    'fast-forward',
                    'progress',
                    'current-time',
                    'duration',
                    'mute',
                    'volume',
                    'settings',
                    'fullscreen'
                ],
                settings: ['speed', 'quality'],
                speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
                storage: { enabled: false }
            });
        });
    </script>
</body>
</html>
