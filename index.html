<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Chame pelo Seu Nome (2017)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 900px; }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
        }
        .sub {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
        }
        .player-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,.6);
        }
        .player-wrapper iframe {
            width: 100%;
            border: 0;
        }
        /* Desktop: 16:9 */
        @media (min-width: 601px) {
            .player-wrapper { aspect-ratio: 16 / 9; }
            .player-wrapper iframe {
                position: absolute;
                top: 0; left: 0;
                height: 100%;
            }
        }
        /* Mobile portrait: taller for easier controls */
        @media (max-width: 600px) {
            .player-wrapper {
                aspect-ratio: 4 / 3;
            }
            .player-wrapper iframe {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                /* video stays 16:9, centered in the 4:3 container */
                height: 75%;
                aspect-ratio: 16 / 9;
            }
            h1 { font-size: 1.2rem; }
            body { padding: 12px; }
        }
        .info {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.82rem;
            color: #777;
        }
        .info span {
            background: #1a1a1a;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .badge { color: #f5c518; }
        footer { margin-top: 30px; font-size: 0.75rem; color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Me Chame pelo Seu Nome <span style="color:#666;font-weight:400;">(2017)</span></h1>
        <div class="sub">Call Me by Your Name · Luca Guadagnino</div>

        <div class="player-wrapper">
            <iframe src="https://drive.google.com/file/d/1i3oEziEYpcbPTTZNxzLaGbMm-aHMez5Y/preview?rm=minimal"
                    allow="autoplay; encrypted-media; fullscreen"
                    allowfullscreen>
            </iframe>
        </div>

        <div class="info">
            <span>🎬 720p BluRay</span>
            <span class="badge">🔊 Dublado</span>
            <span>📦 1.2 GB</span>
            <span>⭐ 8.0/10</span>
        </div>
        <footer></footer>
    </div>
</body>
</html>
